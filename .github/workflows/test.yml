name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Ruff & pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt
      - name: Ruff format
        run: ruff format --check .
      - name: Ruff lint
        run: ruff check .
      - name: Pytest
        run: pytest --cov=custom_components.github_insights --cov-report=term-missing
